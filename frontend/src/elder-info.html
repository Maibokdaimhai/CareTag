<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลผู้สูงอายุ - CareTag</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { background: #00b900; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .info-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .label { font-weight: bold; color: #555; display: block; }
        .value { font-size: 18px; color: #333; }
        .emergency-call { display: block; background: #f44336; color: white; text-align: center; padding: 15px; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 id="elderName">กำลังโหลดข้อมูล...</h2>
    </div>
    <div class="content">
        <div class="info-group">
            <span class="label">กรุ๊ปเลือด</span>
            <span class="value" id="bloodType">-</span>
        </div>
        <div class="info-group">
            <span class="label">โรคประจำตัว</span>
            <span class="value" id="diseases">-</span>
        </div>
        <div class="info-group">
            <span class="label">ประวัติการแพ้ยา</span>
            <span class="value" id="allergies" style="color: red;">-</span>
        </div>
        <div class="info-group">
            <span class="label">สิทธิ์การรักษา</span>
            <span class="value" id="medicalRights">-</span>
        </div>

        <a href="#" id="callRel" class="emergency-call">📞 โทรหาญาติฉุกเฉิน</a>
    </div>
</div>

<script>
    // ดึงข้อมูลจาก URL (เราจะส่งมาเป็น Query String)
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug') || 'test-slug-123';

    async function loadElderInfo() {
        try {
            // เรียก API ไปที่ Backend เพื่อดึงข้อมูลผู้สูงอายุตาม Slug
            const response = await fetch(`http://localhost:3000/api/elder-info/${slug}`);
            const data = await response.json();

            if (response.ok) {
                document.getElementById('elderName').innerText = `คุณ${data.elder_fname} ${data.elder_sname}`;
                document.getElementById('bloodType').innerText = data.blood_type;
                document.getElementById('diseases').innerText = data.chronic_diseases;
                document.getElementById('allergies').innerText = data.allergies;
                document.getElementById('medicalRights').innerText = data.medical_rights;
                document.getElementById('callRel').href = `tel:${data.profiles[0].phone1}`;
            }
        } catch (err) {
            console.error("Load Error:", err);
        }
    }

    loadElderInfo();
</script>
</body>
</html>
