<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareTag - แจ้งเหตุฉุกเฉิน</title>
    <style>
        body { font-family: 'Kanit', sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; font-size: 24px; }
        p { color: #666; margin-bottom: 25px; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-lost { background-color: #ff9800; color: white; }
        .btn-accident { background-color: #f44336; color: white; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <h1>🆘 พบผู้สูงอายุต้องการความช่วยเหลือ</h1>
    <p>กรุณาเลือกสถานการณ์ที่ท่านพบเห็น</p>
    
    <button class="btn btn-lost" onclick="sendEmergency('พลัดหลง')">แจ้งเหตุ: พลัดหลง</button>
    <button class="btn btn-accident" onclick="sendEmergency('เกิดอุบัติเหตุ')">แจ้งเหตุ: เกิดอุบัติเหตุ</button>
</div>

<script>
    async function sendEmergency(incidentType) {
        // 1. ขออนุญาตใช้ตำแหน่ง (Requirement 1.2)
        if (!confirm("ระบบขออนุญาตเข้าถึงตำแหน่งปัจจุบันของคุณเพื่อแจ้งพิกัดแก่ญาติ?")) {
            return;
        }

        // 2. ดึงพิกัด GPS
        navigator.geolocation.getCurrentPosition(async (position) => {
            const { latitude, longitude } = position.coords;
            
            // 3. รับเบอร์โทรผู้ช่วยเหลือ (Requirement 1.3)
            const helperPhone = prompt("กรุณากรอกเบอร์โทรศัพท์ของคุณเพื่อให้ญาติติดต่อกลับ:");
            if (!helperPhone) return;

            // ข้อมูลที่จะส่งไป Backend
            const payload = {
                slug: "test-slug-123", // ต้องตรงกับค่าในตาราง tags (qr_code_slug)
                lat: latitude,
                lng: longitude,
                incident_type: incidentType,
                helper_phone: helperPhone
            };

            try {
                // 4. ส่งข้อมูลไปที่ Backend
                const response = await fetch('http://localhost:3000/api/report-emergency', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok) {
                    alert("✅ ส่งข้อมูลให้ญาติเรียบร้อยแล้ว");
                    // ย้ายไปหน้าข้อมูลส่วนตัวพร้อมส่ง slug ไปด้วย
                    window.location.href = `elder-info.html?slug=${payload.slug}`;
                } else {
                    alert("❌ เกิดข้อผิดพลาด: " + result.error);
                }
            } catch (error) {
                alert("❌ ไม่สามารถเชื่อมต่อกับ Server ได้ (เช็คว่ารัน node src/app.js หรือยัง?)");
            }

        }, (error) => {
            alert("กรุณาเปิด GPS เพื่อให้ระบบแจ้งพิกัดที่แม่นยำแก่ญาติ");
        });
    }
</script>

</body>
</html>
